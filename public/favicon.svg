<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Outer shadow for depth -->
  <path d="M 64 20 L 106 45 L 106 93 L 64 118 L 22 93 L 22 45 Z" fill="rgba(15, 23, 42, 0.08)" transform="translate(0, 4)" filter="blur(2px)" />

  <!-- Main Dice Body (White background with thick rounded borders) -->
  <path d="M 64 18 L 108 44 L 108 94 L 64 120 L 20 94 L 20 44 Z" 
        fill="#FFFFFF" 
        stroke="#1E293B" 
        stroke-width="10" 
        stroke-linejoin="round" />

  <!-- Internal Edge Lines of the 3D Cube -->
  <path d="M 64 69 L 20 44 M 64 69 L 108 44 M 64 69 L 64 120" 
        stroke="#1E293B" 
        stroke-width="9" 
        stroke-linecap="round" 
        stroke-linejoin="round" />

  <!-- TOP FACE: 1 Red Dot (Centered) -->
  <!-- Top Face center is approx (64, 44) -->
  <circle cx="64" cy="44" r="11" fill="#EF4444" stroke="#B91C1C" stroke-width="1.5" />

  <!-- LEFT FACE: 3 Black/Dark Slate Dots (Diagonal from bottom-left to top-right) -->
  <!-- Aligned with perspective -->
  <circle cx="34" cy="89" r="6.5" fill="#1E293B" />
  <circle cx="42" cy="82" r="6.5" fill="#1E293B" />
  <circle cx="50" cy="75" r="6.5" fill="#1E293B" />

  <!-- RIGHT FACE: 2 Black/Dark Slate Dots (Diagonal from bottom-left to top-right) -->
  <!-- Aligned with perspective -->
  <circle cx="76" cy="89" r="6.5" fill="#1E293B" />
  <circle cx="96" cy="75" r="6.5" fill="#1E293B" />
</svg>
