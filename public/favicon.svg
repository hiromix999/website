<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background: White rounded square -->
  <rect width="128" height="128" rx="28" fill="#FFFFFF" />

  <!-- Outer shadow for depth -->
  <path d="M 64 15 L 106 40 L 106 88 L 64 113 L 22 88 L 22 40 Z" fill="rgba(15, 23, 42, 0.08)" transform="translate(0, 3)" filter="blur(2px)" />

  <!-- Main Dice Body (White background with thick rounded borders) -->
  <path d="M 64 13 L 108 39 L 108 89 L 64 115 L 20 89 L 20 39 Z" 
        fill="#FFFFFF" 
        stroke="#1E293B" 
        stroke-width="10" 
        stroke-linejoin="round" />

  <!-- Internal Edge Lines of the 3D Cube -->
  <path d="M 64 64 L 20 39 M 64 64 L 108 39 M 64 64 L 64 115" 
        stroke="#1E293B" 
        stroke-width="9" 
        stroke-linecap="round" 
        stroke-linejoin="round" />

  <!-- TOP FACE: 1 Red Dot (Centered) -->
  <circle cx="64" cy="39" r="11" fill="#EF4444" stroke="#B91C1C" stroke-width="1.5" />

  <!-- LEFT FACE: 3 Black/Dark Slate Dots (Diagonal) -->
  <circle cx="34" cy="84" r="6.5" fill="#1E293B" />
  <circle cx="42" cy="77" r="6.5" fill="#1E293B" />
  <circle cx="50" cy="70" r="6.5" fill="#1E293B" />

  <!-- RIGHT FACE: 2 Black/Dark Slate Dots (Diagonal) -->
  <circle cx="76" cy="84" r="6.5" fill="#1E293B" />
  <circle cx="96" cy="70" r="6.5" fill="#1E293B" />
</svg>
